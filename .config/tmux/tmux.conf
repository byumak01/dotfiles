# ~/.config/tmux/tmux.conf

# General Settings
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g set-clipboard external
set -as terminal-features ",xterm-ghostty:RGB:clipboard"
set -as terminal-features ",ghostty:RGB:clipboard"
set -as terminal-features ",xterm-256color:RGB:clipboard"
set -sg escape-time 0
set -g display-time 4000
set -g focus-events on

# Key Bindings
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind p paste-buffer
bind P choose-buffer
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# Alt+number window switching
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Resize panes
bind -n C-Left resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up resize-pane -U 5
bind -n C-Down resize-pane -D 5

# Vim-tmux navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# Copy mode (vi bindings)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'

# Status Bar
set -g status-interval 5
set -g status-justify centre
set -g status-style bg=#282c34,fg=#c0c8d4

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#e5e9f0,bg=#384150,bold]  #S #[fg=#384150,bg=#282c34,nobold]"

# Right: date & time
set -g status-right-length 60
set -g status-right "#[fg=#9aa6b8]  %a %d %b #[fg=#687386]│#[fg=#c0c8d4,bold]  %H:%M "

# Window tabs
set -g window-status-format "#[fg=#9aa6b8] #I:#W "
set -g window-status-current-format "#[fg=#e5e9f0,bg=#384150,bold] #I:#W #[fg=#384150,bg=#282c34,nobold]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style fg=#3a4250
set -g pane-active-border-style fg=#88a8c7

# Message styling
set -g message-style bg=#384150,fg=#e5e9f0,bold
set -g message-command-style bg=#384150,fg=#e5e9f0
set -g mode-style bg=#3f4a5c,fg=#e5e9f0
set -g display-panes-colour "#687386"
set -g display-panes-active-colour "#88a8c7"
